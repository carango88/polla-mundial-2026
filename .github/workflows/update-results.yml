name: Update results

# Auto-refresh results.js from ESPN ~2h20 after each match kicks off (with a
# ~3h10 safety pass for knockout games that go to extra time / penalties).
# Triggers are the distinct kickoff+offset times-of-day across the 2026 fixture
# list, restricted to June & July (UTC). Off-slot runs are harmless no-ops since
# the updater only commits when results.js actually changes.
on:
  schedule:
    - cron: "10 0 * 6,7 *"
    - cron: "20 0 * 6,7 *"
    - cron: "10 1 * 6,7 *"
    - cron: "20 1 * 6,7 *"
    - cron: "50 1 * 6,7 *"
    - cron: "10 2 * 6,7 *"
    - cron: "20 2 * 6,7 *"
    - cron: "40 2 * 6,7 *"
    - cron: "50 2 * 6,7 *"
    - cron: "10 3 * 6,7 *"
    - cron: "20 3 * 6,7 *"
    - cron: "40 3 * 6,7 *"
    - cron: "50 3 * 6,7 *"
    - cron: "10 4 * 6,7 *"
    - cron: "20 4 * 6,7 *"
    - cron: "40 4 * 6,7 *"
    - cron: "10 5 * 6,7 *"
    - cron: "20 5 * 6,7 *"
    - cron: "10 6 * 6,7 *"
    - cron: "20 6 * 6,7 *"
    - cron: "10 7 * 6,7 *"
    - cron: "20 18 * 6,7 *"
    - cron: "10 19 * 6,7 *"
    - cron: "20 19 * 6,7 *"
    - cron: "10 20 * 6,7 *"
    - cron: "20 20 * 6,7 *"
    - cron: "10 21 * 6,7 *"
    - cron: "20 21 * 6,7 *"
    - cron: "10 22 * 6,7 *"
    - cron: "20 22 * 6,7 *"
    - cron: "50 22 * 6,7 *"
    - cron: "10 23 * 6,7 *"
    - cron: "20 23 * 6,7 *"
    - cron: "40 23 * 6,7 *"
  workflow_dispatch:         # allow manual "Run workflow" button

permissions:
  contents: write            # needed to commit results.js back

concurrency:
  group: update-results
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch latest results from ESPN
        run: node update_results.js

      - name: Commit results.js if it changed
        run: |
          if git diff --quiet -- results.js; then
            echo "No changes — nothing to commit."
          else
            git config user.name "results-bot"
            git config user.email "actions@github.com"
            git add results.js
            git commit -m "Auto-update results.js from ESPN [skip ci]"
            git push
            echo "results.js updated and pushed."
          fi
