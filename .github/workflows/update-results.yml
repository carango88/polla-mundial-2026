name: Update results

# Auto-refresh results.js from ESPN every 10 minutes across the whole match +
# finish window (June & July, UTC): 16:00–07:59 UTC covers US afternoon/evening
# kickoffs through late games finishing after midnight ET. Off-slot runs are
# harmless no-ops — the updater only commits when results.js actually changes.
# (GitHub cron is best-effort and can lag/skip; running often raises the odds a
# run lands soon after a match ends.)
on:
  schedule:
    - cron: "*/10 16-23 * 6,7 *"   # 16:00–23:59 UTC every 10 min (US afternoon/evening games)
    - cron: "*/10 0-7 * 6,7 *"     # 00:00–07:59 UTC every 10 min (late games finishing overnight ET)
  workflow_dispatch:         # allow manual "Run workflow" button

permissions:
  contents: write            # needed to commit results.js back

concurrency:
  group: update-results
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch latest results from ESPN
        run: node update_results.js

      - name: Commit results.js if it changed
        run: |
          if git diff --quiet -- results.js; then
            echo "No changes — nothing to commit."
          else
            git config user.name "results-bot"
            git config user.email "actions@github.com"
            git add results.js
            git commit -m "Auto-update results.js from ESPN [skip ci]"
            git push
            echo "results.js updated and pushed."
          fi
