<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Polla Mundial 2026</title>
<style>
:root{
  --bg:#0f1424; --panel:#171d33; --panel2:#1f2742; --line:#2b3454;
  --text:#eef1fb; --muted:#9aa6c9; --accent:#3ad29f; --accent2:#ffd34e;
  --win:#3ad29f; --bad:#ff6b6b; --gold:#ffd34e;
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg);color:var(--text);font-size:14px}
header{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:16px;
  background:linear-gradient(90deg,#10213f,#16213d);position:sticky;top:0;z-index:10}
header h1{font-size:19px;margin:0;letter-spacing:.3px}
header .sub{color:var(--muted);font-size:12px}
.tabs{display:flex;gap:4px;margin-left:auto}
.tab{padding:9px 16px;border-radius:8px;cursor:pointer;color:var(--muted);font-weight:600;border:1px solid transparent}
.tab.active{background:var(--panel2);color:var(--text);border-color:var(--line)}
main{padding:20px 22px;max-width:1200px;margin:0 auto}
.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:16px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
input,select{background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:8px 10px;font-size:13px}
button.btn{background:var(--accent);color:#072018;border:none;border-radius:8px;padding:9px 14px;font-weight:700;cursor:pointer}
button.ghost{background:transparent;border:1px solid var(--line);color:var(--text)}
.muted{color:var(--muted)}
table{width:100%;border-collapse:collapse}
th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--line)}
th{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;user-select:none}
tbody tr:hover{background:var(--panel2)}
.rank{font-weight:800;color:var(--muted);width:38px}
.total{font-weight:800;color:var(--accent);font-size:15px}
.pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;background:var(--panel2);border:1px solid var(--line)}
.name-link{cursor:pointer;font-weight:600}
.name-link:hover{color:var(--accent)}
/* group grid */
.match{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:3px;padding:2px 3px;border:1px solid var(--line);border-radius:7px;background:var(--panel2);font-size:11.5px}
.match .t{font-weight:700;letter-spacing:.2px;display:flex;align-items:center;gap:4px}
.match .t.away{justify-content:flex-end;text-align:right}
.match .fl{font-size:13px;line-height:1}
.match .pick{cursor:pointer;border-radius:6px;padding:4px 6px}
.match .t.pick:hover{background:var(--panel)}
.match .pick.on{background:var(--accent);color:#072018}
.match .pick.on .muted{color:#0a3a2b}
.tie{font-size:10px;color:var(--muted);background:var(--panel);border:1px solid var(--line);text-align:center;white-space:nowrap;padding:2px 5px;border-radius:5px}
/* read-only results */
.match.ro .t{cursor:default}
.match .t.win{background:var(--accent);color:#062017;font-weight:800;border-radius:6px;padding:4px 6px}
.match .t.win .muted{color:#0a3a2b}
.match .t.lose{opacity:.38}
.match .tie.midwin{background:var(--accent);color:#062017;border-color:var(--accent);font-weight:800}
.match .tie.tieres{background:var(--gold);color:#3a2c00;border-color:var(--gold);font-weight:800}
.match.pending{opacity:.5}
.match.played{border-color:rgba(58,210,159,.45);background:rgba(58,210,159,.06)}
.match.tie{border-color:rgba(255,211,78,.6);background:rgba(255,211,78,.08)}
.tie.hand{border:none;background:transparent;font-size:14px;padding:0}
.grid3{display:grid;grid-template-columns:repeat(auto-fill,minmax(188px,1fr));gap:6px}
.grpgrid{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:5px}
@media(max-width:1024px){.grpgrid{grid-template-columns:repeat(3,minmax(0,1fr))}}
@media(max-width:560px){.grpgrid{grid-template-columns:repeat(2,minmax(0,1fr))}}
.jumpbar{position:sticky;top:var(--hh,66px);z-index:8;display:flex;flex-wrap:wrap;gap:6px;align-items:center;
  padding:9px 12px;margin-bottom:14px;background:rgba(23,29,51,.96);backdrop-filter:blur(8px);
  border:1px solid var(--line);border-radius:12px}
.jchip{appearance:none;-webkit-appearance:none;font-family:inherit;background:transparent;
  border:1px solid var(--line);color:var(--muted);border-radius:999px;
  padding:4px 11px;font-weight:700;font-size:12px;cursor:pointer;line-height:1.4;transition:all .12s}
.jchip:hover{color:var(--text);border-color:var(--accent)}
.jchip.act{background:var(--accent);color:#062017;border-color:var(--accent)}
.jsep{width:1px;height:18px;background:var(--line);margin:0 3px}
[id^="sec-"]{scroll-margin-top:calc(var(--hh,66px) + 56px)}
.grp{margin-top:14px;scroll-margin-top:calc(var(--hh,66px) + 56px)}
.grp-h{display:flex;align-items:center;gap:12px;padding:6px 2px 9px;border-bottom:1px solid var(--line);margin-bottom:9px}
.grp-h>span:first-child{font-weight:800;letter-spacing:.5px;color:var(--accent);text-transform:uppercase;font-size:13px}
.grp-teams{color:var(--muted);font-size:12px}
.grp-teams .fl{font-size:14px}
.teamgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:6px}
.chk{display:flex;align-items:center;gap:7px;padding:6px 9px;border:1px solid var(--line);border-radius:8px;background:var(--panel2);cursor:pointer}
.chk.on{border-color:var(--accent);background:rgba(58,210,159,.12)}
.chk input{accent-color:var(--accent)}
.counter{font-weight:700}
.counter.full{color:var(--accent)}
h3{margin:18px 0 8px;font-size:14px;letter-spacing:.3px}
.stage-pts{font-size:11px;color:var(--muted)}
.ok{color:var(--win)} .ko{color:var(--bad)}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:6px}
.badge{font-size:10px;padding:1px 6px;border-radius:6px;margin-left:6px}
.live{background:rgba(58,210,159,.15);color:var(--accent)}
.search{flex:1;min-width:200px}
.section-score{margin-left:auto;font-weight:700;color:var(--accent)}
.kv{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--line)}
small.hint{color:var(--muted);display:block;margin-top:4px}
.toprow{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.duel-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:760px){.duel-grid{grid-template-columns:1fr}}
.stack{display:flex;height:14px;border-radius:7px;overflow:hidden;background:var(--panel2);margin-top:12px;border:1px solid var(--line)}
.stack span{display:block;height:100%}
.s-cur{background:var(--accent)} .s-win{background:var(--gold)} .s-lost{background:var(--bad)}
code{background:var(--panel2);padding:1px 5px;border-radius:5px}
.barrow{display:grid;grid-template-columns:minmax(120px,180px) 1fr 92px;gap:10px;align-items:center;padding:4px 0}
.barrow .lbl{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.barrow .track{background:var(--panel2);border-radius:6px;height:10px;overflow:hidden;border:1px solid var(--line)}
.barrow .fill{background:var(--accent);height:100%;display:block}
.barrow .val{text-align:right;color:var(--muted);font-size:12px;white-space:nowrap}
.barrow .fill.home{background:var(--accent)}
.barrow .fill.draw{background:var(--gold)}
.barrow .fill.away{background:#5aa9ff}
.mpoll{border:1px solid var(--line);border-radius:8px;margin:5px 0;background:var(--panel2)}
.mpoll>summary{cursor:pointer;padding:8px 11px;font-weight:700;font-size:13px;list-style:none;display:flex;align-items:center;gap:6px}
.mpoll>summary::-webkit-details-marker{display:none}
.mpoll>summary:hover{color:var(--accent)}
.mpoll[open]>summary{border-bottom:1px solid var(--line)}
.mpoll-body{padding:9px 13px}
.pcard{display:grid;grid-template-columns:14px 1fr auto 1fr;align-items:center;gap:5px;padding:4px 7px;border:1px solid var(--line);border-radius:7px;background:var(--panel2);font-size:11.5px;font-weight:700}
.pcard .pteam{display:flex;align-items:center;gap:4px;color:var(--muted)}
.pcard .pteam.a{justify-content:flex-end;text-align:right}
.pcard .pteam .fl{font-size:13px}
.pcard .pmid{font-size:11px}
.pcard .pteam.psel{color:var(--text)}
.pcard .pstat{font-size:11px;color:var(--muted);text-align:center}
.pcard.ok{border-color:rgba(58,210,159,.5);background:rgba(58,210,159,.07)}
.pcard.ok .pstat{color:var(--win)} .pcard.ok .pteam.psel{color:var(--accent)}
.pcard.bad{border-color:rgba(255,107,107,.4);background:rgba(255,107,107,.07)}
.pcard.bad .pstat{color:var(--bad)} .pcard.bad .pteam.psel{color:#ff9b9b}
.pcard.pend{opacity:.72}
.splitrow{display:grid;grid-template-columns:minmax(150px,1fr) 2fr 64px;gap:10px;align-items:center;padding:5px 0}
.splbl{font-weight:700;font-size:12.5px;display:flex;align-items:center;gap:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.splbl .fl{font-size:14px}
.splbar{display:flex;height:12px;border-radius:6px;overflow:hidden;border:1px solid var(--line);background:var(--panel2)}
.sp{height:100%}
.sp.home,.spdot.home{background:var(--accent)} .sp.draw,.spdot.draw{background:var(--gold)} .sp.away,.spdot.away{background:#5aa9ff}
.spval{text-align:right;font-size:11px;white-space:nowrap}
.spdot{display:inline-block;width:9px;height:9px;border-radius:2px;vertical-align:middle;margin-right:2px}
/* selecciones / picks chips */
.pkstage{margin-bottom:11px}
.pkhead{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.pkwrap{display:flex;flex-wrap:wrap;gap:5px}
.pk{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:700;padding:3px 8px;border-radius:6px;border:1px solid var(--line);background:var(--panel2)}
.pk .fl{font-size:13px;line-height:1}
.pk.pk-ok{border-color:rgba(58,210,159,.5);background:rgba(58,210,159,.1);color:var(--accent)}
.pk.pk-out{border-color:rgba(255,107,107,.4);background:rgba(255,107,107,.08);color:#ff9b9b;text-decoration:line-through}
.pk.pk-out .muted{text-decoration:none}
</style>
</head>
<body>
<header>
  <div>
    <h1>🏆 Polla Mundial 2026</h1>
    <div class="sub">193 participantes · 311 puntos posibles</div>
  </div>
  <div class="tabs">
    <div class="tab active" data-tab="leaderboard">Clasificación</div>
    <div class="tab" data-tab="results">Resultados</div>
    <div class="tab" data-tab="participant">Participante</div>
    <div class="tab" data-tab="tracked">Mis perfiles 👀</div>
    <div class="tab" data-tab="stats">Estadísticas 📊</div>
    <div class="tab" data-tab="goals">Goleadores ⚽</div>
  </div>
</header>
<main id="app"></main>

<script src="data.js?v=4"></script>
<script src="results.js?v=4"></script>
<script src="app.js?v=4"></script>
</body>
</html>
